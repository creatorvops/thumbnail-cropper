<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Batch Thumbnail Cropper</title>
  <!-- Tailwind CSS for sleek dark-mode styling -->
  <script src="https://jsdelivr.net"></script>
  <!-- JSZip to bundle cropped images locally -->
  <script src="https://cloudflare.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 w-96 p-4 font-sans selection:bg-teal-500 selection:text-slate-900">
  <div class="flex flex-col gap-4">
    <div class="flex items-center justify-between border-b border-slate-800 pb-2">
      <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-teal-400 to-emerald-400 bg-clip-text text-transparent">Thumbnail Cropper</h1>
      <span class="text-xs bg-slate-800 px-2 py-0.5 rounded text-slate-400 font-mono">v1.0</span>
    </div>

    <!-- Image Upload Area -->
    <div id="drop-zone" class="border-2 border-dashed border-slate-700 hover:border-teal-500 rounded-xl p-6 text-center cursor-pointer transition-colors bg-slate-950/50">
      <input type="file" id="file-input" multiple accept="image/*" class="hidden">
      <div class="text-sm font-medium text-slate-300">Drop images here or <span class="text-teal-400 underline decoration-2 underline-offset-2">browse</span></div>
      <div class="text-xs text-slate-500 mt-1">Supports PNG, JPG, WEBP</div>
    </div>

    <!-- Controls Panel -->
    <div class="bg-slate-950/40 rounded-xl p-3 border border-slate-800/60 flex flex-col gap-3 text-xs">
      <div>
        <label class="block text-slate-400 mb-1 font-medium">Canvas Aspect Ratio</label>
        <div class="grid grid-cols-2 gap-2">
          <button id="ratio-1-1" class="py-1.5 px-3 rounded-lg font-medium border text-center transition-all bg-teal-500/10 border-teal-500 text-teal-400 shadow-sm shadow-teal-500/10">1:1 Square</button>
          <button id="ratio-4-3" class="py-1.5 px-3 rounded-lg font-medium border text-center transition-all bg-slate-900 border-slate-800 text-slate-400 hover:text-slate-300 hover:border-slate-700">4:3 Canvas</button>
        </div>
      </div>

      <div>
        <div class="flex justify-between text-slate-400 mb-1 font-medium">
          <label>Padding around image</label>
          <span id="padding-val" class="font-mono text-teal-400">20px</span>
        </div>
        <input type="range" id="padding-slider" min="0" max="100" value="20" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-teal-500">
      </div>

      <div>
        <label class="block text-slate-400 mb-1 font-medium">Background Color</label>
        <div class="flex gap-2 items-center bg-slate-900 border border-slate-800 rounded-lg p-1.5">
          <input type="color" id="bg-color" value="#ffffff" class="w-6 h-6 border-0 rounded cursor-pointer bg-transparent">
          <input type="text" id="bg-hex" value="#ffffff" class="bg-transparent text-slate-300 font-mono w-full uppercase focus:outline-hidden">
        </div>
      </div>
    </div>

    <!-- Actions & Previews -->
    <button id="download-btn" class="w-full bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-950 font-semibold py-2 px-4 rounded-xl transition-all shadow-md shadow-emerald-500/10 active:scale-[0.98] disabled:opacity-40 disabled:pointer-events-none" disabled>
      Download All as ZIP
    </button>

    <div id="preview-container" class="grid grid-cols-3 gap-2 max-h-40 overflow-y-auto pr-1 hidden border-t border-slate-800 pt-3"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
